<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Event - Campus Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand" href="/">🎓 Purdue Campus Events</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light btn-sm">⬅ Cancel & Go Back</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Wait!</strong> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-primary">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">✏️ Edit Event: {{ event.title }}</h5>
                    </div>
                    <div class="card-body">
                        <form action="/edit_event/{{ event.id }}" method="POST" class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Event Title</label>
                                <input type="text" name="title" class="form-control" value="{{ event.title }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" name="event_date" class="form-control" value="{{ event.event_date }}" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Start Time</label>
                                <input type="time" name="start_time" class="form-control" value="{{ event.start_time.strftime('%H:%M') }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">End Time</label>
                                <input type="time" name="end_time" class="form-control" value="{{ event.end_time.strftime('%H:%M') }}" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Description</label>
                                <input type="text" name="description" class="form-control" value="{{ event.description }}" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-bold">Location</label>
                                <select name="location_id" class="form-select" required>
                                    {% for loc in locations %}
                                        <option value="{{ loc.id }}" {% if event.location_id == loc.id %}selected{% endif %}>
                                            {{ loc.building_name }} {{ loc.room_number }} (Cap: {{ loc.capacity }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-success w-100 fw-bold">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
